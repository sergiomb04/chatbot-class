<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="chat-container">

        <header>
            <h1>App Chat</h1>
        </header>

        <section id="chat">
            <ul id="messages">
                
            </ul>
            <p id="bot-thinking">Bot pensando...</p>
        </section>

        <!-- NUEVA ZONA DE INPUT -->
        <div id="input-area">
            <input type="text" id="txtName" placeholder="Escribe un mensaje...">
            <button id="btnAdd">Enviar</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
